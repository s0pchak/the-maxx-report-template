services:
  - type: web
    name: the-maxx-report
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: test -f data/usage.sample.js && echo "Serving prebuilt static dashboard bundle (real data/usage.js overrides the sample when committed)"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /data/*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
