[build]
  publish = "."
  command = "test -f data/usage.json && test -f data/usage.js && echo 'Serving prebuilt static dashboard bundle'"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
