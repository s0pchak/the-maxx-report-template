<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Maxx Report</title>
    <meta
      name="description"
      content="Local telemetry for extremely normal AI usage. Count tokens. Question choices. Are you even token maxxing, bro?"
    />
    <meta property="og:title" content="The Maxx Report" />
    <meta
      property="og:description"
      content="Local telemetry for extremely normal AI usage. Count tokens. Question choices."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Maxx Report" />
    <meta
      name="twitter:description"
      content="Local telemetry for extremely normal AI usage. Count tokens. Question choices."
    />
    <meta name="theme-color" content="#d6ff3f" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">The Maxx Report</p>
          <div class="hero-title">
            <h1><span id="heroTotal">--</span> <span id="heroTotalUnit">output tokens</span></h1>
            <span class="hero-owner" id="ownerHandle" hidden></span>
            <span class="plan-pill" id="planPill" hidden></span>
          </div>
          <div class="hero-actions">
            <div class="hero-tagline-row">
              <p class="hero-tagline">Count tokens. Question choices.</p>
              <a
                class="repo-link"
                href="https://github.com/s0pchak/the-maxx-report"
                target="_blank"
                rel="noreferrer"
                aria-label="Open The Maxx Report repository"
                title="Open The Maxx Report repository"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 .5a11.5 11.5 0 0 0-3.64 22.41c.58.11.79-.25.79-.56v-2.02c-3.21.7-3.89-1.38-3.89-1.38-.53-1.35-1.3-1.71-1.3-1.71-1.06-.73.08-.72.08-.72 1.17.08 1.79 1.21 1.79 1.21 1.04 1.78 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.56-.29-5.26-1.28-5.26-5.71 0-1.26.45-2.29 1.2-3.1-.12-.29-.52-1.47.11-3.05 0 0 .98-.31 3.17 1.18A11 11 0 0 1 12 6.07c.98 0 1.96.13 2.88.39 2.19-1.49 3.17-1.18 3.17-1.18.63 1.58.23 2.76.11 3.05.75.81 1.2 1.84 1.2 3.1 0 4.44-2.7 5.42-5.27 5.71.42.36.79 1.07.79 2.16v3.05c0 .31.21.68.8.56A11.5 11.5 0 0 0 12 .5Z"
                  />
                </svg>
              </a>
            </div>
            <span class="hero-updated">
              <span class="hero-updated-label">As Of</span>
              <span class="hero-updated-date" id="generatedDate">--</span>
              <strong id="generatedTime">--</strong>
            </span>
          </div>
        </div>
      </header>

      <section class="workspace">
        <div class="chart-panel">
          <div class="panel-head">
            <div>
              <h2>Daily Token Load</h2>
              <p id="rangeCaption">--</p>
            </div>
            <div class="controls" aria-label="Range and metric">
              <div class="segmented" role="group" aria-label="Metric">
                <button type="button" class="active" data-metric="output" title="Tokens Claude actually generated. Full price. The honest number.">Output</button>
                <button type="button" data-metric="new" title="Output + fresh input + cache creation. Excludes cache reads.">New</button>
                <button type="button" data-metric="total" title="Everything including cache reads. Inflated by 1M-context cache replays.">Total</button>
                <button type="button" data-metric="cost" title="Approximate USD spend per day using data/pricing.js rates.">$ Cost</button>
              </div>
              <div class="segmented" role="group" aria-label="Range">
                <button type="button" class="active" data-range="all">All</button>
                <button type="button" data-range="45">45d</button>
                <button type="button" data-range="30">30d</button>
                <button type="button" data-range="14">14d</button>
              </div>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="dailyChart" width="1280" height="520" aria-label="Daily token usage chart"></canvas>
            <div class="tooltip" id="chartTooltip" hidden></div>
          </div>
        </div>

        <aside class="side-rail" aria-label="Breakdown">
          <section class="side-panel">
            <h2>Model Receipts</h2>
            <div class="model-mix" id="modelMix"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="./data/usage.js"></script>
    <script src="./data/pricing.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
